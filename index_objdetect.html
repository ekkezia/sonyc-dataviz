<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>NYC SONYC Playground</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #2a2a38;
      --text: #c8c8dc; --muted: #555570; --accent: #5b8fff;
      --mono: 'IBM Plex Mono', monospace;
    }
    html, body { height: 100%; background: #fff; font-family: var(--mono); overflow: hidden; }
    .layout { display: flex; flex-direction: column; height: 100%; }

    /* ── Single unified view ── */
    #projView {
      flex: 1; display: flex; flex-direction: column;
      position: relative; overflow: hidden;
      isolation: isolate; /* own stacking context so z-indexes are local */
    }
    #projZone { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    /* Camera layer — video only, faded */
    #cameraLayer {
      position: absolute; inset: 0; z-index: 2;
      pointer-events: none; transform: scaleX(-1);
    }
    #cameraLayer.hidden { opacity: 0; }
    #video { opacity: 0.4; }
    /* Overlay canvas: lives OUTSIDE cameraLayer so it gets its own z-index above bottom panels.
       Flip applied here directly so the draw logic stays the same. */
    #overlay {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: auto; z-index: 16;
      transform: scaleX(-1);
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    /* Bottom UI sits below overlay (z:15 < z:16).
       pointer-events toggled by JS: none when camera menu active, auto when hidden. */
    #projBottomUi {
      position: relative; z-index: 15;
      display: flex; flex-direction: column;
      pointer-events: none; /* disabled while camera overlay is active */
    }
    #projCanvas { position: absolute; inset: 0; display: block; }

    video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* Topbar — floating dark overlay, slides in/out from top */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 6px 12px; min-height: 42px; flex-shrink: 0;
      background: rgba(19,19,26,.93); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(4px);
      transition: transform .18s, opacity .18s;
    }
    #topbar.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
    #bottombar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 14px; padding: 4px 12px;
      background: rgba(19,19,26,.85); border-top: 1px solid var(--border);
      font-size: 9px; color: var(--muted);
      transition: transform .18s, opacity .18s;
    }
    #bottombar.hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }

    /* Grid corner handles */
    #overlay { cursor: default; }

    .logo { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing:.1em; white-space:nowrap; }
    .vsep { width:1px; height:20px; background:var(--border); flex-shrink:0; }
    .btn {
      font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 5px 10px;
      background: transparent; border: 1px solid var(--border); border-radius: 5px;
      color: var(--muted); cursor: pointer; letter-spacing:.05em;
      transition: border-color .12s, color .12s, background .12s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--text); }
    .btn.on  { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.danger:hover { border-color: #f05; color: #f05; }
    #trackerRow { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .chip {
      display:flex; align-items:center; gap:5px; padding:3px 8px 3px 5px;
      border:1px solid var(--border); border-radius:20px; font-size:10px;
      cursor:pointer; transition:border-color .12s; background:transparent; font-family:var(--mono);
    }
    .chip.active-chip { border-color:rgba(255,255,255,.45); }
    .chip-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .chip-label { color:var(--text); letter-spacing:.04em; }
    .chip-cell  { color:var(--muted); font-size:9px; min-width:34px; }
    .chip-remove { color:var(--muted); font-size:11px; background:none; border:none; cursor:pointer; padding:0 0 0 2px; font-family:var(--mono); transition:color .1s; }
    .chip-remove:hover { color:#f05; }
    #addPawnBtn {
      display:flex; align-items:center; gap:4px; padding:3px 9px;
      border:1px dashed var(--border); border-radius:20px; font-size:10px;
      font-family:var(--mono); color:var(--muted); background:none; cursor:pointer;
      transition:border-color .12s, color .12s; letter-spacing:.04em;
    }
    #addPawnBtn:hover { border-color:var(--accent); color:var(--accent); }
    #pawnPicker {
      position:absolute; top:46px; left:50%; transform:translateX(-50%);
      background:var(--surface); border:1px solid var(--border); border-radius:8px;
      padding:12px; z-index:30; display:none; flex-direction:column; gap:8px;
      min-width:260px; box-shadow:0 8px 28px rgba(0,0,0,.7);
    }
    #pawnPicker.open { display:flex; }
    #pickerSwatches { display:flex; flex-wrap:wrap; gap:8px; }
    .pick-close { align-self:flex-end; font-size:10px; color:var(--muted); cursor:pointer; background:none; border:none; font-family:var(--mono); letter-spacing:.04em; }
    .pick-close:hover { color:var(--text); }
    .pick-swatch { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:6px 8px; border-radius:6px; border:1px solid transparent; transition:border-color .12s; font-family:var(--mono); }
    .pick-swatch:hover { border-color:var(--border); }
    .pick-swatch.disabled { opacity:.3; pointer-events:none; }
    .pick-swatch span { font-size:9px; color:var(--muted); }
    .pick-circle { width:22px; height:22px; border-radius:50%; }
    #pickerCustomRow { display:flex; align-items:center; gap:8px; padding-top:8px; border-top:1px solid var(--border); }
    #pickerCustomRow label { font-size:9px; color:var(--muted); }
    #customColorPick { width:26px; height:26px; border:none; background:none; cursor:pointer; border-radius:3px; }
    #customHueLbl { font-size:9px; color:var(--muted); min-width:40px; }
    #addCustomBtn { font-family:var(--mono); font-size:9px; padding:3px 8px; margin-left:auto; background:transparent; border:1px solid var(--border); border-radius:4px; color:var(--text); cursor:pointer; }
    #addCustomBtn:hover { border-color:var(--accent); }
    #hint {
      position:absolute; top:12px; left:50%; transform:translateX(-50%);
      font-size:11px; font-weight:600; background:rgba(10,10,15,.92);
      border:1px solid var(--accent); padding:6px 16px; border-radius:5px;
      color:var(--accent); pointer-events:none; opacity:0; transition:opacity .2s;
      white-space:nowrap; letter-spacing:.05em; z-index:25;
    }
    #hint.show { opacity:1; }
    /* Timeline bar picker popup */
    #timelinePicker {
      position:absolute; top:46px; right:0; background:var(--surface);
      border:1px solid var(--border); border-radius:8px; padding:12px;
      z-index:30; display:none; flex-direction:column; gap:8px;
      min-width:220px; box-shadow:0 8px 28px rgba(0,0,0,.7);
    }
    #timelinePicker.open { display:flex; }
    #tlPickerSwatches { display:flex; flex-wrap:wrap; gap:8px; }
    .chip-capture { color:var(--muted); font-size:12px; background:none; border:1px solid transparent; border-radius:10px; cursor:pointer; padding:1px 5px; font-family:var(--mono); transition:color .1s, border-color .1s; letter-spacing:.03em; }
    .chip-capture:hover { color:var(--accent); border-color:var(--accent); }
    .chip-capture.capturing { color:#ff8800; border-color:#ff8800; animation: capturePulse 0.6s ease-in-out infinite; }
    @keyframes capturePulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
    .stat { display:flex; gap:4px; }
    .stat span:last-child { color:var(--text); }
    #bCells { display:flex; gap:10px; margin-left:auto; }

    /* Projection UI (floated at bottom over full-bleed canvas) */
    #projDate {
      text-align: center; border-top: 2px solid #111; border-bottom: 2px solid #111;
      padding: 9px 24px; font-size: 15px; font-weight: 600;
      letter-spacing: .15em; color: #111; background: rgba(255,255,255,0.9);
    }
    #projStats {
      display: flex; align-items: center; justify-content: space-around;
      padding: 10px 24px; background: rgba(255,255,255,0.9); gap: 16px;
    }
    .proj-player { display: flex; align-items: center; gap: 14px; }
    .proj-avatar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .proj-player-label { font-size: 9px; color: #888; letter-spacing: .1em; }
    .proj-avatar {
      width: 54px; height: 54px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 17px; font-weight: 700; letter-spacing: .02em;
    }
    .proj-score-wrap { display: flex; flex-direction: column; gap: 1px; }
    .proj-score-label { font-size: 9px; color: #888; letter-spacing: .1em; }
    .proj-score-val { font-size: 34px; font-weight: 700; color: #111; line-height: 1; }
    .proj-noise-icons { display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
    .noise-tag {
      display: flex; align-items: center; gap: 6px;
      padding: 2px 9px; border-radius: 12px; font-size: 11px; letter-spacing: .03em;
    }
    .proj-divider { width: 1px; height: 60px; background: #ddd; flex-shrink: 0; }
    #projSliderWrap {
      padding: 6px 24px 8px; background: rgba(255,255,255,0.9);
      border-top: 1px solid #e8e8e8; display: flex; flex-direction: column; gap: 4px;
    }
    #projSliderLabel { font-size: 11px; color: #555; letter-spacing: .1em; text-align: center; transition: color .15s; }
    #projSliderLabel.settling { animation: sliderSettle 0.45s ease-in-out infinite alternate; }
    @keyframes sliderSettle {
      from { color: #aaa; text-shadow: none; }
      to   { color: #5b8fff; text-shadow: 0 0 8px #5b8fffcc, 0 0 20px #5b8fff44; }
    }
    #projSlider { width: 100%; accent-color: #111; cursor: pointer; }
    #projSliderTicks { display: flex; justify-content: space-between; font-size: 9px; color: #bbb; letter-spacing: .05em; }
    #projSliderTicks span { transition: color .2s, font-weight .1s; }
    #projSliderTicks span.active { color: #111; font-weight: 600; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Unified view: projection is primary, camera + controls are overlaid -->
  <div id="projView">
    <!-- Camera layer: video only (faded), full-bleed -->
    <div id="cameraLayer">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <!-- Overlay canvas: separate from cameraLayer so it gets z-index:16, above bottom panels -->
    <canvas id="overlay"></canvas>

    <div id="projZone">

      <!-- Projection canvas (bottom layer) -->
      <canvas id="projCanvas"></canvas>

      <!-- Topbar controls (floating dark overlay, toggleable) -->
      <div id="topbar">
        <div class="logo">PAWN/TRACK</div>
        <div class="vsep"></div>
        <div id="trackerRow"></div>
        <button id="addPawnBtn" onclick="openPicker()">+ PAWN</button>
        <div class="vsep"></div>
        <button class="btn" id="captureTimelineBtn" onclick="startCapture('timeline')">&#9678; CAPTURE TIMELINE</button>
        <div id="statusTag" style="margin-left:auto;font-size:10px;color:var(--muted)">INIT</div>
      </div>

      <!-- Bottom stats bar (toggleable with topbar) -->
      <div id="bottombar">
        <div class="stat"><span>FPS</span><span id="bFps">-</span></div>
        <div class="stat"><span>BLOBS</span><span id="bBlobs">-</span></div>
        <div class="stat"><span>GRID</span><span id="bGrid">none</span></div>
        <div id="bCells"></div>
      </div>

      <!-- Pawn picker -->
      <div id="pawnPicker">
        <button class="pick-close" onclick="closePicker()">CLOSE x</button>
        <div id="pickerSwatches"></div>
        <div id="pickerCustomRow">
          <label>CUSTOM</label>
          <input type="color" id="customColorPick" value="#ff8800" oninput="onCustomColorChange()">
          <span id="customHueLbl">H: 32</span>
          <button id="addCustomBtn" onclick="addCustomColor()">ADD</button>
        </div>
      </div>

      <!-- Hint (mode indicator) -->
      <div id="hint"></div>

    </div>

    <!-- Bottom UI: slider + stats — floats over full-bleed canvas -->
    <div id="projBottomUi">
      <div id="projSliderWrap">
        <div id="projSliderLabel">LOADING DATA&#8230;</div>
        <input type="range" id="projSlider" min="0" max="1000" value="0"
               oninput="onProjSliderChange(+this.value)">
        <div id="projSliderTicks"></div>
      </div>
      <div id="projStats">
        <!-- Player 1 -->
        <div class="proj-player">
          <div class="proj-avatar-wrap">
            <span class="proj-player-label">PLAYER 1</span>
            <div class="proj-avatar" style="background:#e63030;border:3px solid #b82020;">P1</div>
          </div>
          <div class="proj-score-wrap">
            <span class="proj-score-label">SCORE</span>
            <span id="p1Score" class="proj-score-val">0</span>
          </div>
          <div id="p1NoiseIcons" class="proj-noise-icons"></div>
        </div>
        <div class="proj-divider"></div>
        <!-- Player 2 -->
        <div class="proj-player">
          <div class="proj-avatar-wrap">
            <span class="proj-player-label">PLAYER 2</span>
            <div class="proj-avatar" style="background:#3070e6;border:3px solid #1a50c0;">P2</div>
          </div>
          <div class="proj-score-wrap">
            <span class="proj-score-label">SCORE</span>
            <span id="p2Score" class="proj-score-val">0</span>
          </div>
          <div id="p2NoiseIcons" class="proj-noise-icons"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="noiseColors.js"></script>
<script src="config.js"></script>
<script>
// ── PAWN PRESETS ────────────────────────────────────────────────
const PRESET_PAWNS = [
  { id:'red',    hue:  0, color:'#e63030', label:'Red',    isWhite:false },
  { id:'blue',   hue:215, color:'#3070e6', label:'Blue',   isWhite:false },
  { id:'green',  hue:120, color:'#30c050', label:'Green',  isWhite:false },
  { id:'yellow', hue: 52, color:'#e6c830', label:'Yellow', isWhite:false },
  { id:'purple', hue:270, color:'#9b40e0', label:'Purple', isWhite:false },
  { id:'orange', hue: 25, color:'#e07830', label:'Orange', isWhite:false },
  { id:'white',  hue:  0, color:'#d8d8d8', label:'White',  isWhite:true  },
];
let allPawnDefs = [...PRESET_PAWNS];
let customCounter = 0;

let activePawnIds  = new Set(['red']);
let selectedChipId = 'red';
const pawnState    = {};
PRESET_PAWNS.forEach(p => { pawnState[p.id] = { pos:null, cell:null }; });

// currentCell[pawnId] = {col,row} or null
const currentCell = {};

// pawns[1] = { color, position: {col,row}|null, score }
const pawns = {
  1: { color: '#e63030', position: null, score: 0 }
};
const pawnIdToIndex = { red: 1 };
let nextPawnIndex = 2;

// Grid state
let grid      = null;
let dragStart = null;
// COLS and ROWS are defined in config.js

// Timeline bar state
let timeBar             = null;   // { x, y, w, h } in canvasPoint space
let timeBarDragStart    = null;
let draggingTimeHandle  = null;   // 'tl' | 'br' | 'new'
let timelineTrackerId   = 'purple';
let timelineSliderPct   = null;   // 0–1, null when not detected

function canvasPxToCell(px, py) {
  if (!grid) return null;
  // px is raw camera space: high x = physical left = visual left (CSS scaleX(-1) corrects it).
  // Convert to visual x so it aligns with grid coords (visual space, 0=left).
  const vx  = overlay.width - px;
  const col = Math.floor((vx - grid.x) / (grid.w / COLS));
  const row = Math.floor((py - grid.y) / (grid.h / ROWS));
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
  return { col, row };
}

// ── DOM ─────────────────────────────────────────────────────────
const video      = document.getElementById('video');
const overlay    = document.getElementById('overlay');
const ctx        = overlay.getContext('2d', { willReadFrequently:true });
const hint       = document.getElementById('hint');
const statusTag  = document.getElementById('statusTag');
const sampleCtx  = document.getElementById('sampleCanvas').getContext('2d');
const trackerRow = document.getElementById('trackerRow');
const bCellsEl   = document.getElementById('bCells');

const offC = document.createElement('canvas');
const offX = offC.getContext('2d', { willReadFrequently:true });
const SCALE = 0.35;

let frameCount = 0, lastFpsTime = performance.now();

// ── CHIPS ───────────────────────────────────────────────────────
function rebuildChips() {
  trackerRow.innerHTML = '';
  activePawnIds.forEach(id => {
    const pd = allPawnDefs.find(p => p.id === id); if (!pd) return;
    const chip = document.createElement('div');
    chip.className = 'chip' + (id === selectedChipId ? ' active-chip' : '');
    const isCap = captureTarget === id;
    const isCapt = trackers[id] && trackers[id].captured;
    chip.innerHTML =
      '<span class="chip-dot" style="background:' + pd.color + '"></span>' +
      '<span class="chip-label">' + pd.label.toUpperCase() + '</span>' +
      '<span class="chip-cell" id="chipCell-' + id + '">-,-</span>' +
      '<button class="chip-capture' + (isCap ? ' capturing' : '') + '" title="Capture object">' + (isCapt ? '&#9679;' : '&#9678;') + '</button>' +
      '<button class="chip-remove" title="Remove">x</button>';
    chip.querySelector('.chip-capture').onclick = function(e){ e.stopPropagation(); startCapture(id); };
    chip.querySelector('.chip-remove').onclick = function(e){ e.stopPropagation(); removePawn(id); };
    chip.addEventListener('click', function(){ selectChip(id); });
    trackerRow.appendChild(chip);
  });
  updateBottomCells();
}

function selectChip(id) { selectedChipId = id; rebuildChips(); }

function removePawn(id) {
  activePawnIds.delete(id);
  if (pawnState[id]) { pawnState[id].pos = null; pawnState[id].cell = null; }
  currentCell[id] = null;
  if (selectedChipId === id) selectedChipId = [...activePawnIds][0] || null;
  rebuildChips();
}

function updateBottomCells() {
  bCellsEl.innerHTML = '';
  activePawnIds.forEach(id => {
    const pd   = allPawnDefs.find(p => p.id === id);
    const cell = currentCell[id];
    const div  = document.createElement('div');
    div.className = 'stat';
    div.innerHTML = '<span style="color:' + (pd ? pd.color : 'var(--muted)') + ';">' +
      ((pd ? pd.label : id)).toUpperCase() + '</span><span>' +
      (cell ? cell.col + ',' + cell.row : '-') + '</span>';
    bCellsEl.appendChild(div);
  });
}

// ── PICKER ──────────────────────────────────────────────────────
function buildPickerSwatches() {
  const sw = document.getElementById('pickerSwatches');
  sw.innerHTML = '';
  allPawnDefs.forEach(pd => {
    const div = document.createElement('div');
    div.className = 'pick-swatch' + (activePawnIds.has(pd.id) ? ' disabled' : '');
    div.innerHTML = '<div class="pick-circle" style="background:' + pd.color + '"></div><span>' + pd.label.toUpperCase() + '</span>';
    div.onclick = function(){ addPawnToTracking(pd.id); closePicker(); };
    sw.appendChild(div);
  });
}
function openPicker()  { buildPickerSwatches(); document.getElementById('pawnPicker').classList.add('open'); }
function closePicker() { document.getElementById('pawnPicker').classList.remove('open'); }

function addPawnToTracking(id) {
  activePawnIds.add(id);
  selectedChipId = id;
  if (!pawnState[id]) pawnState[id] = { pos:null, cell:null };
  if (!trackers[id])  trackers[id]  = new ObjectTracker();
  if (!pawnIdToIndex[id]) {
    const idx = nextPawnIndex++;
    pawnIdToIndex[id] = idx;
    const pd = allPawnDefs.find(function(p){ return p.id===id; });
    pawns[idx] = { color: pd ? pd.color : '#ffffff', position: null, score: 0 };
  }
  rebuildChips();
}

function onCustomColorChange() {
  const hex = document.getElementById('customColorPick').value;
  const rv = parseInt(hex.slice(1),16);
  const r=(rv>>16)&255, g=(rv>>8)&255, b=rv&255;
  const h = rgbToHsv(r,g,b)[0];
  document.getElementById('customHueLbl').textContent = 'H: ' + Math.round(h);
}

function addCustomColor() {
  const hex = document.getElementById('customColorPick').value;
  const rv = parseInt(hex.slice(1),16);
  const r=(rv>>16)&255, g=(rv>>8)&255, b=rv&255;
  const h = rgbToHsv(r,g,b)[0];
  customCounter++;
  const id = 'custom' + customCounter;
  const pd = { id, hue:Math.round(h), color:hex, label:'C'+customCounter, isWhite:false };
  allPawnDefs.push(pd);
  pawnState[id] = { pos:null, cell:null };
  addPawnToTracking(id);
  closePicker();
}


// ── CAMERA ──────────────────────────────────────────────────────
async function startCamera() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }, audio:false });
    video.srcObject = s; statusTag.textContent = 'CAMERA OK';
  } catch(e) { statusTag.textContent = 'CAM ERROR'; console.error(e); }
}

function resizeCanvases() {
  overlay.width  = video.videoWidth  || overlay.offsetWidth;
  overlay.height = video.videoHeight || overlay.offsetHeight;
  offC.width  = Math.max(1, Math.round(overlay.width  * SCALE));
  offC.height = Math.max(1, Math.round(overlay.height * SCALE));
}

// ── GRID HANDLES ────────────────────────────────────────────────
const HANDLE_R = 14; // canvas pixels
let draggingHandle = null; // 'tl' | 'br' | 'new'

function canvasPoint(e) {
  const rect = overlay.getBoundingClientRect();
  const sx = overlay.width  / rect.width;
  const sy = overlay.height / rect.height;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  // Return VISUAL coordinates (0=visual-left). CSS scaleX(-1) is on #overlay so
  // the visual left IS the left edge of the bounding rect, same as a normal element.
  return { x:(cx - rect.left)*sx, y:(cy-rect.top)*sy };
}

function hitHandle(px, py) {
  if (!grid) return null;
  const d = function(ax,ay,bx,by){ return Math.sqrt((ax-bx)*(ax-bx)+(ay-by)*(ay-by)); };
  if (d(px,py, grid.x,        grid.y       ) < HANDLE_R*2.5) return 'tl';
  if (d(px,py, grid.x+grid.w, grid.y+grid.h) < HANDLE_R*2.5) return 'br';
  return null;
}

function hitTimeHandle(px, py) {
  if (!timeBar) return null;
  const d = function(ax,ay,bx,by){ return Math.sqrt((ax-bx)*(ax-bx)+(ay-by)*(ay-by)); };
  if (d(px,py, timeBar.x,           timeBar.y           ) < HANDLE_R*2.5) return 'tl';
  if (d(px,py, timeBar.x+timeBar.w, timeBar.y+timeBar.h ) < HANDLE_R*2.5) return 'br';
  return null;
}

overlay.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  overlay.setPointerCapture(e.pointerId);
  const p = canvasPoint(e);
  const th = hitTimeHandle(p.x, p.y);
  if (th) { draggingTimeHandle = th; return; }
  draggingHandle = hitHandle(p.x, p.y);
  // No fallback — only start a drag when a handle is hit
});

overlay.addEventListener('pointermove', function(e) {
  if (!draggingHandle && !draggingTimeHandle) return;
  e.preventDefault();
  const p = canvasPoint(e);
  if (draggingTimeHandle === 'tl') {
    timeBar = normaliseRect(p, { x: timeBar.x+timeBar.w, y: timeBar.y+timeBar.h });
  } else if (draggingTimeHandle === 'br') {
    timeBar = normaliseRect({ x: timeBar.x, y: timeBar.y }, p);
  } else if (draggingHandle === 'tl') {
    grid = normaliseRect(p, { x: grid.x+grid.w, y: grid.y+grid.h });
  } else if (draggingHandle === 'br') {
    grid = normaliseRect({ x: grid.x, y: grid.y }, p);
  }
  const h = hitHandle(p.x, p.y) || hitTimeHandle(p.x, p.y);
  overlay.style.cursor = h ? 'nwse-resize' : (draggingHandle || draggingTimeHandle ? 'crosshair' : 'default');
});

overlay.addEventListener('pointermove', function(e) {
  if (draggingHandle || draggingTimeHandle) return;
  const p = canvasPoint(e);
  overlay.style.cursor = (hitHandle(p.x, p.y) || hitTimeHandle(p.x, p.y)) ? 'nwse-resize' : 'default';
});

overlay.addEventListener('pointerup', function(e) {
  if (grid) {
    document.getElementById('bGrid').textContent = COLS + 'x' + ROWS + ' (' + Math.round(grid.w/COLS) + 'px/cell)';
  }
  draggingHandle = null;
  draggingTimeHandle = null;
});

function normaliseRect(a, b) {
  return { x:Math.min(a.x,b.x), y:Math.min(a.y,b.y), w:Math.abs(b.x-a.x), h:Math.abs(b.y-a.y) };
}

function clearGrid() {
  grid = null; dragStart = null;
  document.getElementById('bGrid').textContent = 'none';
  activePawnIds.forEach(function(id) {
    if (pawnState[id]) pawnState[id].cell = null;
    currentCell[id] = null;
  });
  updateBottomCells();
}

function centerGrid() {
  if (!overlay.width || !overlay.height) return;
  const pad    = 30;
  const tbH    = 24;
  const tbGap  = 16;
  const cellSize = Math.min(
    Math.floor((overlay.width  - pad * 2) / COLS),
    Math.floor((overlay.height - pad * 2 - tbH - tbGap) / ROWS)
  );
  const w = COLS * cellSize;
  const h = ROWS * cellSize;
  const x = Math.round((overlay.width  - w) / 2);
  const y = Math.round((overlay.height - h - tbH - tbGap) / 2);
  grid = { x, y, w, h };
  timeBar = { x, y: y + h + tbGap, w, h: tbH };
  document.getElementById('bGrid').textContent = COLS + 'x' + ROWS + ' (' + cellSize + 'px/cell)';
}

// ── MAIN LOOP ───────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (video.readyState < 2) return;

  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime > 600) {
    document.getElementById('bFps').textContent = Math.round(frameCount*1000/(now-lastFpsTime));
    frameCount = 0; lastFpsTime = now;
  }

  offX.drawImage(video, 0, 0, offC.width, offC.height);
  const imgData = offX.getImageData(0, 0, offC.width, offC.height);



  let totalBlobs = 0;
  activePawnIds.forEach(function(id) {
    const blobs = detectBlobs(imgData, id);
    totalBlobs += blobs.length;
    if (blobs.length > 0) {
      const best = blobs.reduce(function(a,b){ return a.area>b.area?a:b; });
      updatePawnState(id, best.cx/SCALE, best.cy/SCALE, best.r/SCALE);
    } else {
      if (pawnState[id]) { pawnState[id].pos = null; pawnState[id].cell = null; }
      currentCell[id] = null;
      checkDwell(id, null);
      const idx = pawnIdToIndex[id];
      if (idx !== undefined) pawns[idx].position = null;
      const chipCell = document.getElementById('chipCell-' + id);
      if (chipCell) chipCell.textContent = '-,-';
    }
  });
  document.getElementById('bBlobs').textContent = totalBlobs;

  // Timeline bar tracker — detect the dedicated color, map X position to slider
  if (timeBar && timelineTrackerId && pawnParams[timelineTrackerId]) {
    const tlBlobs = detectBlobs(imgData, timelineTrackerId);
    if (tlBlobs.length > 0) {
      const best = tlBlobs.reduce(function(a,b){ return a.area>b.area?a:b; });
      const cx_raw = best.cx / SCALE;
      // cx_raw is raw camera space (high x = visual left). Convert to visual x first,
      // then map onto the bar (timeBar.x is visual-left in visual space).
      const visual_cx = overlay.width - cx_raw;
      const rawPct = Math.max(0, Math.min(1, (visual_cx - timeBar.x) / timeBar.w));
      timelineSliderPct = rawPct;
      const sliderVal = Math.round(rawPct * 1000);
      const slider = document.getElementById('projSlider');
      if (slider) {
        slider.value = sliderVal;
        if (Math.abs(sliderDwell.val - sliderVal) > 4) {
          // Moved more than 4 units — reset the settle timer (ignore camera jitter)
          sliderDwell = { val: sliderVal, startTime: Date.now(), active: true };
          const lbl = document.getElementById('projSliderLabel');
          if (lbl) {
            const ratio = sliderVal / 1000;
            const pi = Math.min(sliderSteps.length - 1,
              Math.round(ratio * (sliderSteps.length - 1)));
            lbl.textContent = (sliderSteps[pi] ? sliderSteps[pi].label : 'NO DATA') + ' \u2026';
            lbl.classList.add('settling');
          }
        }
      }
    }
    // If no blob found, keep last known pct so bar doesn't snap away
  }

  draw();
}

function updatePawnState(id, cx, cy, r) {
  const state    = pawnState[id];
  const prevCell = state.cell;
  state.pos  = { cx, cy, r };
  const cell = canvasPxToCell(cx, cy);
  state.cell      = cell;
  currentCell[id] = cell;
  const idx = pawnIdToIndex[id];
  if (idx !== undefined) pawns[idx].position = cell;
  checkDwell(id, cell);
  updateGameState(id, prevCell, cell);
  const chipCell = document.getElementById('chipCell-' + id);
  if (chipCell) chipCell.textContent = cell ? cell.col+','+cell.row : '-,-';
  updateBottomCells();
}

// ── HSV ─────────────────────────────────────────────────────────
function rgbToHsv(r,g,b) {
  r/=255; g/=255; b/=255;
  var max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min, h=0;
  if (d>0) {
    if (max===r)      h=60*(((g-b)/d)%6);
    else if (max===g) h=60*((b-r)/d+2);
    else              h=60*((r-g)/d+4);
    if (h<0) h+=360;
  }
  return [h, max===0?0:d/max*255, max*255];
}
function hueDiff(a,b){ var d=Math.abs(a-b)%360; return d>180?360-d:d; }

// ── OBJECT TRACKER (CamShift) ────────────────────────────────────
// Tracks a specific object via hue histogram backprojection + MeanShift.
// Call capture() once to save the reference; track() each frame returns {cx,cy,r} or null.
class ObjectTracker {
  constructor() {
    this.hist     = null;   // Float32Array(16) — normalised hue histogram
    this.lastBox  = null;   // {x,y,w,h} last search window in offC pixels
    this.captured = false;
    this.ROI_HALF = 30;     // half-size of capture ROI in offC pixels
  }

  // cx, cy in offC (raw camera) pixel space
  capture(imgData, cx, cy) {
    const W = imgData.width, H = imgData.height;
    const x0 = Math.max(0, Math.round(cx - this.ROI_HALF));
    const y0 = Math.max(0, Math.round(cy - this.ROI_HALF));
    const x1 = Math.min(W, Math.round(cx + this.ROI_HALF));
    const y1 = Math.min(H, Math.round(cy + this.ROI_HALF));
    const hist = new Float32Array(16);
    const data = imgData.data;
    let count = 0;
    for (let y = y0; y < y1; y++) {
      for (let x = x0; x < x1; x++) {
        const i = (y * W + x) * 4;
        const hsv = rgbToHsv(data[i], data[i+1], data[i+2]);
        if (hsv[1] > 40 && hsv[2] > 40) {
          hist[Math.floor(hsv[0] / 22.5) % 16]++;
          count++;
        }
      }
    }
    if (count > 0) for (let i = 0; i < 16; i++) hist[i] /= count;
    this.hist = hist;
    this.lastBox = { x: x0, y: y0, w: x1-x0, h: y1-y0 };
    this.captured = true;
  }

  // Returns {cx, cy, r} in offC pixel space, or null if lost
  track(imgData) {
    if (!this.hist || !this.captured) return null;
    const W = imgData.width, H = imgData.height;
    const data = imgData.data;

    // Backprojection: map each pixel to its histogram probability
    const prob = new Float32Array(W * H);
    let maxP = 0;
    for (let i = 0; i < W * H; i++) {
      const hsv = rgbToHsv(data[i*4], data[i*4+1], data[i*4+2]);
      if (hsv[1] > 25 && hsv[2] > 25) {
        const p = this.hist[Math.floor(hsv[0] / 22.5) % 16];
        prob[i] = p;
        if (p > maxP) maxP = p;
      }
    }
    if (maxP < 1e-6) return null;
    const scale = 255 / maxP;
    for (let i = 0; i < W * H; i++) prob[i] *= scale;

    // MeanShift: iteratively shift search window to probability centroid
    let bx = this.lastBox ? this.lastBox.x : Math.round(W * 0.25);
    let by = this.lastBox ? this.lastBox.y : Math.round(H * 0.25);
    const bw = this.lastBox ? this.lastBox.w : Math.round(W * 0.5);
    const bh = this.lastBox ? this.lastBox.h : Math.round(H * 0.5);

    for (let iter = 0; iter < 12; iter++) {
      const x0 = Math.max(0, bx), y0 = Math.max(0, by);
      const x1 = Math.min(W, bx + bw), y1 = Math.min(H, by + bh);
      let m00 = 0, m10 = 0, m01 = 0;
      for (let y = y0; y < y1; y++) {
        for (let x = x0; x < x1; x++) {
          const p = prob[y * W + x];
          m00 += p; m10 += p * x; m01 += p * y;
        }
      }
      if (m00 < 1) break;
      const newBx = Math.round(m10/m00 - bw/2);
      const newBy = Math.round(m01/m00 - bh/2);
      if (Math.abs(newBx - bx) < 1 && Math.abs(newBy - by) < 1) { bx = newBx; by = newBy; break; }
      bx = newBx; by = newBy;
    }
    bx = Math.max(0, Math.min(W - bw, bx));
    by = Math.max(0, Math.min(H - bh, by));
    this.lastBox = { x: bx, y: by, w: bw, h: bh };

    // Confidence check: average probability within window
    const x0 = Math.max(0, bx), y0 = Math.max(0, by);
    const x1 = Math.min(W, bx+bw), y1 = Math.min(H, by+bh);
    let total = 0, area = (x1-x0) * (y1-y0);
    for (let y = y0; y < y1; y++)
      for (let x = x0; x < x1; x++) total += prob[y*W+x];
    if (area < 1 || total/area < 28) return null;

    return { cx: bx + bw/2, cy: by + bh/2, r: Math.sqrt(bw * bh) / 2 };
  }
}

// ── DRAW (camera overlay) ────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,overlay.width,overlay.height);
  if (grid) drawGridOverlay(true);
  if (timeBar) drawTimeBar();
  activePawnIds.forEach(function(id) {
    const s = pawnState[id];
    if (s&&s.pos) drawPawn(allPawnDefs.find(function(p){ return p.id===id; }), s);
  });
}

function drawGridOverlay(showActive) {
  if (!grid) return;
  // Flip horizontally so the overlay matches the CSS-corrected camera view
  ctx.save();
  ctx.translate(overlay.width, 0);
  ctx.scale(-1, 1);
  const gx=grid.x, gy=grid.y, gw=grid.w, gh=grid.h;
  const cellW=gw/COLS, cellH=gh/ROWS;
  const fontSize=Math.max(7, Math.min(10, cellW/4));
  const activeCells = new Map();
  if (showActive) {
    activePawnIds.forEach(function(id) {
      const s = pawnState[id];
      if (s&&s.cell) {
        const k = s.cell.col+','+s.cell.row;
        const pd = allPawnDefs.find(function(p){ return p.id===id; });
        activeCells.set(k, pd ? pd.color : '#fff');
      }
    });
  }
  for (var row=0; row<ROWS; row++) {
    for (var col=0; col<COLS; col++) {
      const cx=gx+col*cellW, cy=gy+row*cellH;
      const k=col+','+row;
      const isActive=activeCells.has(k);
      ctx.beginPath(); ctx.rect(cx, cy, cellW, cellH);
      if (isActive) {
        const c=activeCells.get(k);
        ctx.fillStyle=c+'40'; ctx.fill();
        ctx.globalAlpha=1; ctx.strokeStyle='rgba(0,0,0,1)'; ctx.lineWidth=2; ctx.stroke();
      } else {
        ctx.globalAlpha=0.5; ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke();
        ctx.globalAlpha=1;
      }
      const lx=cx+cellW/2, ly=cy+cellH/2+fontSize*0.4;
      ctx.globalAlpha = isActive ? 1 : 0.4;
      ctx.fillStyle = isActive ? 'rgba(0,0,0,0.85)' : '#000';
      ctx.font=fontSize+'px IBM Plex Mono,monospace';
      ctx.textAlign='center';
      ctx.fillText(col+','+row, lx, ly);
      ctx.globalAlpha=1;
    }
  }
  ctx.textAlign='left';
  ctx.strokeStyle='rgba(0,0,0,0.85)'; ctx.lineWidth=2;
  ctx.strokeRect(gx,gy,gw,gh);
  ctx.restore();

  // Corner handles (drawn after restore so they're also flipped with the layer)
  ctx.save();
  ctx.translate(overlay.width, 0);
  ctx.scale(-1, 1);
  [[gx, gy], [gx+gw, gy+gh]].forEach(function(h) {
    ctx.beginPath(); ctx.arc(h[0], h[1], HANDLE_R, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
    ctx.strokeStyle = '#5b8fff'; ctx.lineWidth = 2.5; ctx.stroke();
    // crosshair inside handle
    ctx.strokeStyle = '#5b8fff'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(h[0]-6,h[1]); ctx.lineTo(h[0]+6,h[1]); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(h[0],h[1]-6); ctx.lineTo(h[0],h[1]+6); ctx.stroke();
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawTimeBar() {
  if (!timeBar) return;
  const tx = timeBar.x, ty = timeBar.y, tw = timeBar.w, th = timeBar.h;
  const tlPd = allPawnDefs.find(function(p){ return p.id === timelineTrackerId; });
  const tlColor = tlPd ? tlPd.color : '#ff8800';

  ctx.save();
  ctx.translate(overlay.width, 0);
  ctx.scale(-1, 1);

  // Bar background
  ctx.globalAlpha = 0.65;
  ctx.fillStyle = '#000';
  ctx.fillRect(tx, ty, tw, th);
  ctx.globalAlpha = 1;

  // Progress fill
  if (timelineSliderPct !== null) {
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = tlColor;
    ctx.fillRect(tx, ty, tw * timelineSliderPct, th);
    ctx.globalAlpha = 1;
  }

  // Date tick marks
  if (sliderSteps.length > 1) {
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1;
    for (var i = 0; i < sliderSteps.length; i++) {
      const tickX = tx + (i / (sliderSteps.length - 1)) * tw;
      ctx.beginPath(); ctx.moveTo(tickX, ty); ctx.lineTo(tickX, ty + th); ctx.stroke();
    }
  }

  // Bar border
  ctx.strokeStyle = tlColor;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(tx, ty, tw, th);

  // Tracker circle on the bar
  if (timelineSliderPct !== null) {
    const cx_draw = tx + timelineSliderPct * tw;
    const cy_draw = ty + th / 2;
    const cr = th / 2 + 4;
    ctx.beginPath(); ctx.arc(cx_draw, cy_draw, cr, 0, Math.PI * 2);
    ctx.fillStyle = tlColor + 'cc'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    // Inner dot
    ctx.beginPath(); ctx.arc(cx_draw, cy_draw, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    // Pct label
    ctx.font = 'bold 9px IBM Plex Mono,monospace';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.fillText(Math.round(timelineSliderPct * 100) + '%', cx_draw, ty - 5);
    ctx.textAlign = 'left';
  }

  ctx.restore();

  // Handles (orange to distinguish from grid's blue handles)
  ctx.save();
  ctx.translate(overlay.width, 0);
  ctx.scale(-1, 1);
  [[tx, ty], [tx + tw, ty + th]].forEach(function(h) {
    ctx.beginPath(); ctx.arc(h[0], h[1], HANDLE_R, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
    ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(h[0]-6,h[1]); ctx.lineTo(h[0]+6,h[1]); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(h[0],h[1]-6); ctx.lineTo(h[0],h[1]+6); ctx.stroke();
  });
  ctx.restore();
}

function drawPawn(pd, state) {
  if (!pd) return;
  const cx=state.pos.cx, cy=state.pos.cy, r=state.pos.r;
  ctx.beginPath(); ctx.arc(cx,cy,r+5,0,Math.PI*2);
  ctx.strokeStyle=pd.color; ctx.lineWidth=2.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=pd.color+'40'; ctx.fill();
  ctx.strokeStyle=pd.color; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2);
  ctx.fillStyle=pd.color; ctx.fill();
  ctx.strokeStyle=pd.color+'88'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx-r-4,cy); ctx.lineTo(cx+r+4,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-r-4); ctx.lineTo(cx,cy+r+4); ctx.stroke();
  ctx.font='bold 11px IBM Plex Mono,monospace';
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.fillText(pd.label.toUpperCase(), cx, cy-r-8);
  if (state.cell) {
    ctx.fillStyle=pd.color;
    ctx.font='10px IBM Plex Mono,monospace';
    ctx.fillText('['+state.cell.col+','+state.cell.row+']', cx, cy+r+16);
  }
  ctx.textAlign='left';
}

async function loadGridData() {
  try {
    const resp = await fetch('mock_noise_grid.csv');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const lines = text.trim().split('\n');
    const result = {};
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line || line.startsWith('#')) continue;
      const first  = line.indexOf(',');
      const second = line.indexOf(',', first + 1);
      const row = parseInt(line.substring(0, first), 10);
      const col = parseInt(line.substring(first + 1, second), 10);
      let raw = line.substring(second + 1).trim();
      if (raw.startsWith('"') && raw.endsWith('"')) {
        raw = raw.slice(1, -1).replace(/""/g, '"');
      }
      if (!result[row]) result[row] = {};
      result[row][col] = JSON.parse(raw);
    }
    gridData = result;
  } catch(e) {
    console.warn('CSV load failed, using fallback data:', e.message);
    gridData = FALLBACK_GRID;
  }
}

// ── TIME OF DAY ─────────────────────────────────────────────────
// Inline implementation mirrors time.js; overridden by dynamic import below.
let getTimeOfDay = function(date) {
  const h = date.getHours();
  if (h >= 5  && h < 12) return 'MORNING';
  if (h >= 12 && h < 17) return 'AFTERNOON';
  if (h >= 17 && h < 21) return 'EVENING';
  return 'NIGHT';
};
// Try to load the canonical ES-module version
import('./utils.js').then(function(mod) {
  if (typeof mod.getTimeOfDay === 'function') getTimeOfDay = mod.getTimeOfDay;
}).catch(function() { /* keep inline fallback */ });

// ── MOCK DATA (mockData.json) ────────────────────────────────────
let mockData    = null;   // full JSON object once loaded
let sliderSteps = [];     // [{dateKey, dateObj, label}] — one entry per date
let sliderIndex = 0;      // resolved integer index into sliderSteps
let sliderDwell = { val: -1, startTime: 0, active: false };
const SLIDER_DWELL_MS = 2000;

// Maps getTimeOfDay() output → ordered list of mockData slot keys to try
const TOD_SLOT_MAP = {
  MORNING:   ['morning'],
  AFTERNOON: ['afternoon', 'noon'],
  EVENING:   ['evening'],
  NIGHT:     ['evening', 'afternoon'],
};

async function loadMockData() {
  try {
    const resp = await fetch('mockData.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    mockData = await resp.json();
    buildSliderSteps();
  } catch(e) {
    console.warn('mockData.json not loaded:', e.message);
  }
}

function buildSliderSteps() {
  sliderSteps = [];
  if (!mockData) return;
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // One step per date key (MMDDYYYY), sorted chronologically
  Object.keys(mockData).sort().forEach(function(dateKey) {
    const mm   = parseInt(dateKey.slice(0, 2), 10) - 1;
    const dd   = parseInt(dateKey.slice(2, 4), 10);
    const yyyy = parseInt(dateKey.slice(4, 8), 10);
    sliderSteps.push({
      dateKey,
      dateObj: new Date(yyyy, mm, dd),
      label:   MONTHS[mm] + ' ' + dd + ', ' + yyyy,
    });
  });

  // Smooth slider: use 0–1000 float range so it glides freely between dates
  const slider = document.getElementById('projSlider');
  if (slider) {
    slider.min   = 0;
    slider.max   = 1000;
    slider.value = 0;
  }
  sliderIndex = 0;
  buildSliderTicks();
  updateProjSliderLabel();
}

function buildSliderTicks() {
  const tickEl = document.getElementById('projSliderTicks');
  if (!tickEl || !sliderSteps.length) return;
  tickEl.innerHTML = sliderSteps
    .map(function(s, i) { return '<span data-i="' + i + '">' + s.label + '</span>'; })
    .join('');
  updateTickActive();
}

function updateTickActive() {
  const tickEl = document.getElementById('projSliderTicks');
  if (!tickEl) return;
  tickEl.querySelectorAll('span').forEach(function(s) {
    s.classList.toggle('active', +s.dataset.i === sliderIndex);
  });
}

// val is a float 0–1000; resolve to the nearest date index
function onProjSliderChange(val, fromDwell) {
  const ratio = val / 1000;
  sliderIndex = Math.min(
    sliderSteps.length - 1,
    Math.round(ratio * (sliderSteps.length - 1))
  );
  updateProjSliderLabel();
  updateTickActive();
  drawProjection();
  updateProjStats();
  if (fromDwell) playLockSound();
}

function playLockSound() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, ctx.currentTime);          // C5
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.12);  // E5
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.45);
    osc.onended = function() { ctx.close(); };
  } catch(e) {}
}

function updateProjSliderLabel() {
  const el = document.getElementById('projSliderLabel');
  if (!el) return;
  el.textContent = sliderSteps.length && sliderSteps[sliderIndex]
    ? sliderSteps[sliderIndex].label
    : 'NO DATA LOADED';
}

// Returns [{type, db}] for a grid cell.
// Date comes from the slider; time-of-day always follows the current real time.
function getMockCellData(row, col) {
  if (mockData && sliderSteps.length && sliderSteps[sliderIndex]) {
    const dateData = mockData[sliderSteps[sliderIndex].dateKey];
    if (dateData) {
      const tod   = getTimeOfDay(new Date());                  // e.g. 'AFTERNOON'
      const slots = TOD_SLOT_MAP[tod] || [tod.toLowerCase()]; // slot keys to try in order
      for (var i = 0; i < slots.length; i++) {
        const slot = dateData[slots[i]];
        if (slot) {
          const sources = slot[row + ',' + col] || [];
          return sources.map(function(s) { return { type: s.sound, db: s.dB }; });
        }
      }
    }
  }
  // Fallback: CSV-based gridData (used before mockData loads)
  return (gridData[row] && gridData[row][col]) || [];
}

// ── PROJECTION ──────────────────────────────────────────────────
// Derive projection pawn list dynamically from activePawnIds so colors always
// match whatever the camera tab is currently tracking.
const PROJ_SLOTS = [
  { label:'P1', scoreEl:'p1Score', noiseEl:'p1NoiseIcons' },
  { label:'P2', scoreEl:'p2Score', noiseEl:'p2NoiseIcons' },
];
function getProjPawns() {
  const result = [];
  let i = 0;
  activePawnIds.forEach(function(id) {
    if (i >= PROJ_SLOTS.length) return;
    const pd  = allPawnDefs.find(function(p){ return p.id === id; });
    const idx = pawnIdToIndex[id];
    if (!pd || idx === undefined) return;
    const slot = PROJ_SLOTS[i++];
    result.push({ id: id, color: pd.color, label: slot.label,
                  scoreEl: slot.scoreEl, noiseEl: slot.noiseEl, idx: idx });
  });
  return result;
}

// ── GAME RULES ───────────────────────────────────────────────────
const START_CELL  = { col: 0,        row: 0        }; // top-left cell
const FINISH_CELL = { col: COLS - 1, row: ROWS - 1 }; // bottom-right cell
const MIN_MOVES   = 10; // unique cells to visit before finish counts

const moveHistory    = {};  // id → Set<"col,row">
const playerFinished = new Set();
let   gameNotif      = '';  // shown on projection
let   gameNotifColor = '#30c050';

function updateGameState(id, prevCell, newCell) {
  if (!moveHistory[id]) moveHistory[id] = new Set();

  // Record new cell as a visited position (only when cell changes)
  if (newCell) {
    const cellKey = newCell.col + ',' + newCell.row;
    if (!prevCell || prevCell.col !== newCell.col || prevCell.row !== newCell.row) {
      moveHistory[id].add(cellKey);
    }
  }

  // Finish condition: player lands on finish cell with 10+ unique cells visited
  if (newCell && !playerFinished.has(id)
      && newCell.col === FINISH_CELL.col && newCell.row === FINISH_CELL.row
      && moveHistory[id].size >= MIN_MOVES) {
    playerFinished.add(id);
    const pp = getProjPawns().find(function(p){ return p.id === id; });
    gameNotif      = (pp ? pp.label : id.toUpperCase()) + ' CROSSED THE FINISH!';
    gameNotifColor = '#e63030';
    return;
  }

  // "Ready to start" — both tracked players simultaneously on start cell
  if (playerFinished.size === 0) {
    const projPawns = getProjPawns();
    if (projPawns.length >= 2) {
      const bothOnStart = projPawns.every(function(p) {
        const c = currentCell[p.id];
        return c && c.col === START_CELL.col && c.row === START_CELL.row;
      });
      if (bothOnStart) {
        gameNotif      = '\u2014 READY TO START \u2014';
        gameNotifColor = '#30c050';
      } else if (gameNotif === '\u2014 READY TO START \u2014') {
        gameNotif = '';
      }
    }
  }
}

// ── DWELL SCORING ────────────────────────────────────────────────
const DWELL_MS = 2000;
const dwellState = {}; // id → { col, row, startTime, scored }

function checkDwell(id, cell) {
  const ds = dwellState[id];
  if (!cell) { dwellState[id] = null; return; }
  if (!ds || ds.col !== cell.col || ds.row !== cell.row) {
    dwellState[id] = { col: cell.col, row: cell.row, startTime: Date.now(), scored: false };
    return;
  }
  if (!ds.scored && (Date.now() - ds.startTime) >= DWELL_MS) {
    ds.scored = true;
    const idx = pawnIdToIndex[id];
    if (idx !== undefined && pawns[idx]) pawns[idx].score += 1;
  }
}

function drawProjection() {
  const zone   = document.getElementById('projZone');
  const canvas = document.getElementById('projCanvas');
  const cw = zone.clientWidth  || 800;
  const ch = zone.clientHeight || 500;
  if (canvas.width !== cw || canvas.height !== ch) {
    canvas.width  = cw;
    canvas.height = ch;
  }
  const pc = canvas.getContext('2d');

  // White background
  pc.fillStyle = '#fff';
  pc.fillRect(0, 0, cw, ch);

  // Time-of-day label (top-left) — always reflects the user's current real time
  const timeLabel = getTimeOfDay(new Date());
  const timeFontSize = Math.min(52, Math.max(22, Math.round(ch * 0.11)));
  pc.font = 'bold ' + timeFontSize + 'px IBM Plex Mono,monospace';
  pc.fillStyle = '#111';
  pc.textAlign = 'left';
  pc.textBaseline = 'top';
  pc.fillText(timeLabel, 20, 10);

  // Game notification (top-right, same baseline as time label)
  if (gameNotif) {
    const nowMs2 = Date.now();
    const pulse  = 0.6 + 0.4 * Math.sin(nowMs2 / 400);
    const notifFs = Math.min(18, Math.max(10, Math.round(timeFontSize * 0.34)));
    pc.font = 'bold ' + notifFs + 'px IBM Plex Mono,monospace';
    pc.textAlign = 'right';
    pc.globalAlpha = pulse;
    pc.fillStyle = gameNotifColor;
    pc.fillText(gameNotif, cw - 20, 10 + (timeFontSize - notifFs) / 2);
    pc.globalAlpha = 1;
  }

  pc.textBaseline = 'alphabetic';

  // Grid layout
  const pad      = 20;
  const gridTop  = timeFontSize + 26;
  const avW      = cw - pad * 2;
  const avH      = ch - gridTop - pad;
  const cellSize = Math.floor(Math.min(avW / COLS, avH / ROWS));
  const gridW    = COLS * cellSize;
  const gridH    = ROWS * cellSize;
  const gridX    = Math.round((cw - gridW) / 2);
  const gridY    = gridTop;

  // Cell fills (noise color) + indicator dots
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const x = gridX + col * cellSize;
      const y = gridY + row * cellSize;
      const sources = getMockCellData(row, col);

      let bgColor = '#f2f2f2';
      if (sources.length > 0) {
        const dominant = sources.reduce((a, b) => a.db > b.db ? a : b);
        const nc = (typeof NOISE_CONFIG !== 'undefined') && NOISE_CONFIG[dominant.type];
        if (nc) bgColor = nc.color + '44';
      }
      pc.fillStyle = bgColor;
      pc.fillRect(x, y, cellSize, cellSize);

      if (sources.length > 0 && cellSize >= 18) {
        sources.slice(0, 4).forEach((src, i) => {
          const nc = (typeof NOISE_CONFIG !== 'undefined') && NOISE_CONFIG[src.type];
          if (!nc) return;
          pc.beginPath();
          pc.arc(x + 5 + i * 9, y + cellSize - 7, 3.5, 0, Math.PI * 2);
          pc.fillStyle = nc.color;
          pc.fill();
        });
      }
    }
  }

  // Dwell glow — pulsing shadow that grows as pawn dwells in a cell
  const nowMs = Date.now();
  activePawnIds.forEach(function(id) {
    const ds = dwellState[id];
    if (!ds) return;
    const pd = allPawnDefs.find(function(p){ return p.id === id; });
    if (!pd) return;
    const elapsed  = nowMs - ds.startTime;
    const progress = Math.min(1, elapsed / DWELL_MS);
    const pulse    = 0.5 + 0.5 * Math.sin(nowMs / 150);
    const alpha    = progress * (0.25 + 0.45 * pulse);
    const blurSize = cellSize * (0.4 + 0.6 * progress) * (0.7 + 0.3 * pulse);
    const x = gridX + ds.col * cellSize;
    const y = gridY + ds.row * cellSize;
    pc.save();
    pc.shadowColor = pd.color;
    pc.shadowBlur  = blurSize;
    pc.globalAlpha = alpha;
    pc.fillStyle   = pd.color;
    pc.fillRect(x + 3, y + 3, cellSize - 6, cellSize - 6);
    pc.restore();
  });

  // Grid lines
  pc.strokeStyle = '#bbb';
  pc.lineWidth = 0.8;
  for (let r = 0; r <= ROWS; r++) {
    pc.beginPath();
    pc.moveTo(gridX, gridY + r * cellSize);
    pc.lineTo(gridX + gridW, gridY + r * cellSize);
    pc.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    pc.beginPath();
    pc.moveTo(gridX + c * cellSize, gridY);
    pc.lineTo(gridX + c * cellSize, gridY + gridH);
    pc.stroke();
  }

  // Outer border
  pc.strokeStyle = '#111';
  pc.lineWidth = 2;
  pc.strokeRect(gridX, gridY, gridW, gridH);

  // ── Start / Finish cell highlights ───���──────────────────────────
  const startX  = gridX + START_CELL.col  * cellSize;
  const startY  = gridY + START_CELL.row  * cellSize;
  const finishX = gridX + FINISH_CELL.col * cellSize;
  const finishY = gridY + FINISH_CELL.row * cellSize;

  // Start cell — green tint + thick border
  pc.fillStyle = 'rgba(48,192,80,0.18)';
  pc.fillRect(startX, startY, cellSize, cellSize);
  pc.strokeStyle = '#30c050'; pc.lineWidth = 2.5;
  pc.strokeRect(startX + 1, startY + 1, cellSize - 2, cellSize - 2);

  // Finish cell — red tint + thick border
  pc.fillStyle = 'rgba(230,48,48,0.18)';
  pc.fillRect(finishX, finishY, cellSize, cellSize);
  pc.strokeStyle = '#e63030'; pc.lineWidth = 2.5;
  pc.strokeRect(finishX + 1, finishY + 1, cellSize - 2, cellSize - 2);

  // ── Start / Finish flags outside the grid ───────────────────────
  const flagSize = Math.min(28, Math.max(16, cellSize * 0.7));
  pc.font = flagSize + 'px serif';
  pc.textBaseline = 'middle';

  // Start flag 🚩 — left of the grid, at row-0 vertical centre
  const startFlagX = gridX - flagSize * 1.6;
  const startFlagY = startY + cellSize / 2;
  // Dashed connector line
  pc.save();
  pc.setLineDash([4, 4]);
  pc.strokeStyle = '#30c050'; pc.lineWidth = 1.5;
  pc.beginPath();
  pc.moveTo(startFlagX + flagSize * 1.2, startFlagY);
  pc.lineTo(startX, startFlagY);
  pc.stroke();
  pc.restore();
  pc.textAlign = 'right';
  pc.fillText('\uD83D\uDEA9', startFlagX + flagSize, startFlagY + flagSize * 0.15);
  // Label
  pc.font = 'bold ' + Math.max(8, Math.round(flagSize * 0.45)) + 'px IBM Plex Mono,monospace';
  pc.fillStyle = '#30c050';
  pc.fillText('START', startFlagX + flagSize, startFlagY + flagSize * 0.85);

  // Finish flag 🏁 — right of the grid, at row-(ROWS-1) vertical centre
  const finishFlagX = gridX + gridW + flagSize * 0.4;
  const finishFlagY = finishY + cellSize / 2;
  // Dashed connector line
  pc.save();
  pc.setLineDash([4, 4]);
  pc.strokeStyle = '#e63030'; pc.lineWidth = 1.5;
  pc.beginPath();
  pc.moveTo(finishX + cellSize, finishFlagY);
  pc.lineTo(finishFlagX, finishFlagY);
  pc.stroke();
  pc.restore();
  pc.textAlign = 'left';
  pc.font = flagSize + 'px serif';
  pc.fillText('\uD83C\uDFC1', finishFlagX, finishFlagY + flagSize * 0.15);
  // Label
  pc.font = 'bold ' + Math.max(8, Math.round(flagSize * 0.45)) + 'px IBM Plex Mono,monospace';
  pc.fillStyle = '#e63030';
  pc.textAlign = 'left';
  pc.fillText('FINISH', finishFlagX, finishFlagY + flagSize * 0.85);

  // Moves counter per active player (small, below flag labels)
  let moveCountY = finishFlagY + flagSize * 1.4;
  getProjPawns().forEach(function(p) {
    const moves = moveHistory[p.id] ? moveHistory[p.id].size : 0;
    const done  = playerFinished.has(p.id);
    pc.font = 'bold ' + Math.max(8, Math.round(flagSize * 0.38)) + 'px IBM Plex Mono,monospace';
    pc.fillStyle = done ? '#30c050' : (moves >= MIN_MOVES ? '#e07830' : p.color);
    pc.textAlign = 'left';
    pc.fillText(p.label + ': ' + moves + '/' + MIN_MOVES + (done ? ' \u2713' : ''), finishFlagX, moveCountY);
    moveCountY += flagSize * 0.6;
  });

  pc.textAlign = 'left'; pc.textBaseline = 'alphabetic';

  // Slider settle countdown bar — shown on canvas while pawn is moving the slider
  if (sliderDwell.active) {
    const now      = Date.now();
    const elapsed  = now - sliderDwell.startTime;
    const progress = Math.min(1, elapsed / SLIDER_DWELL_MS);
    const remaining = ((SLIDER_DWELL_MS - elapsed) / 1000).toFixed(1);
    const pulse    = 0.55 + 0.45 * Math.sin(now / 180);

    const pi = Math.min(sliderSteps.length - 1,
      Math.round((sliderDwell.val / 1000) * (sliderSteps.length - 1)));
    const pendingLabel = sliderSteps[pi] ? sliderSteps[pi].label : '\u2014';

    const bx = 20, bw = cw - 40, bh = 30, by = ch - bh - 12;
    // Track background
    pc.fillStyle = 'rgba(0,0,0,0.07)';
    pc.fillRect(bx, by, bw, bh);
    // Fill bar
    pc.fillStyle = 'rgba(91,143,255,' + (0.22 + 0.18 * pulse) + ')';
    pc.fillRect(bx, by, bw * progress, bh);
    // Border
    pc.strokeStyle = 'rgba(91,143,255,' + (0.4 + 0.4 * pulse) + ')';
    pc.lineWidth = 1.5;
    pc.strokeRect(bx, by, bw, bh);
    // Text
    const cfs = Math.max(10, Math.round(bh * 0.42));
    pc.font = 'bold ' + cfs + 'px IBM Plex Mono,monospace';
    pc.fillStyle = 'rgba(91,143,255,' + (0.7 + 0.3 * pulse) + ')';
    pc.textAlign = 'center';
    pc.textBaseline = 'middle';
    pc.fillText('HOLD STILL \u2014 ' + pendingLabel + ' \u2014 locking in ' + remaining + 's', cw / 2, by + bh / 2);
    pc.textAlign = 'left'; pc.textBaseline = 'alphabetic';
  }

  // Pawn circles
  getProjPawns().forEach(function(p) {
    const cell = currentCell[p.id];
    if (!cell) return;
    const cx = gridX + cell.col * cellSize + cellSize / 2;
    const cy = gridY + cell.row * cellSize + cellSize / 2;
    const r  = Math.max(10, cellSize * 0.36);
    pc.beginPath(); pc.arc(cx, cy, r, 0, Math.PI * 2);
    pc.fillStyle = p.color; pc.globalAlpha = 0.92; pc.fill();
    pc.globalAlpha = 1;
    pc.strokeStyle = '#fff'; pc.lineWidth = 2.5; pc.stroke();
    const fs = Math.max(10, Math.round(r * 0.82));
    pc.font = 'bold ' + fs + 'px IBM Plex Mono,monospace';
    pc.fillStyle = '#fff'; pc.textAlign = 'center'; pc.textBaseline = 'middle';
    pc.fillText(p.label, cx, cy);
    pc.textAlign = 'left'; pc.textBaseline = 'alphabetic';
  });
}

function updateProjStats() {
  getProjPawns().forEach(function(p) {
    // Sync avatar color to the live camera pawn color
    const avatarEls = document.querySelectorAll('.proj-avatar');
    const slotIdx   = PROJ_SLOTS.findIndex(function(s){ return s.scoreEl === p.scoreEl; });
    if (slotIdx >= 0 && avatarEls[slotIdx]) {
      const darker = p.color.replace(/^#/, '');
      avatarEls[slotIdx].style.background = p.color;
      avatarEls[slotIdx].style.borderColor = '#' + darker;
    }

    const cell    = currentCell[p.id];
    const sources = (cell && gridData[cell.row] && gridData[cell.row][cell.col]) || [];

    const scoreDOM = document.getElementById(p.scoreEl);
    if (scoreDOM && pawns[p.idx]) scoreDOM.textContent = pawns[p.idx].score;

    const noiseDOM = document.getElementById(p.noiseEl);
    if (!noiseDOM) return;
    noiseDOM.innerHTML = '';

    if (sources.length === 0) {
      const quiet = document.createElement('span');
      quiet.style.cssText = 'font-size:11px;color:#aaa;letter-spacing:.05em;padding:2px 0;';
      quiet.textContent   = cell ? '\u2014 QUIET \u2014' : '\u2014 NO SIGNAL \u2014';
      noiseDOM.appendChild(quiet);
    } else {
      sources.forEach(function(src) {
        const nc  = (typeof NOISE_CONFIG !== 'undefined') && NOISE_CONFIG[src.type];
        const col = nc ? nc.color : '#999';
        const ico = nc ? nc.icon  : '?';
        const lbl = nc ? nc.label : src.type;
        const tag = document.createElement('div');
        tag.className = 'noise-tag';
        tag.style.cssText = 'background:' + col + '22;border:1px solid ' + col + '99;';
        tag.innerHTML = '<span style="font-size:16px;">' + ico + '</span>' +
          '<span style="color:#111;font-size:10px;letter-spacing:.04em;">' +
          lbl.toUpperCase() + ' ' + src.db + 'dB</span>';
        noiseDOM.appendChild(tag);
      });
    }
  });
}

// ── OVERLAY TOGGLE (M key) ───────────────────────────────────────
let overlaysVisible = true;
function toggleOverlays() {
  overlaysVisible = !overlaysVisible;
  document.getElementById('cameraLayer').classList.toggle('hidden',    !overlaysVisible);
  document.getElementById('overlay').classList.toggle('hidden',        !overlaysVisible);
  document.getElementById('topbar').classList.toggle('hidden',         !overlaysVisible);
  document.getElementById('bottombar').classList.toggle('hidden',      !overlaysVisible);
  // When camera/menu is hidden, enable projection bottom UI (date slider, stats)
  document.getElementById('projBottomUi').style.pointerEvents = overlaysVisible ? 'none' : 'auto';
}

// Projection draw loop — RAF for smooth dwell pulsing
(function projRAF() {
  // Commit slider date after SLIDER_DWELL_MS of stillness
  if (sliderDwell.active && Date.now() - sliderDwell.startTime >= SLIDER_DWELL_MS) {
    sliderDwell.active = false;
    onProjSliderChange(sliderDwell.val, true);
    const lbl = document.getElementById('projSliderLabel');
    if (lbl) lbl.classList.remove('settling');
  }
  drawProjection();
  requestAnimationFrame(projRAF);
})();

// Date + stats update every second
setInterval(function() {
  updateProjStats();
}, 1000);

// ── FULLSCREEN (press F while on projection tab) ─────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'm' || e.key === 'M') { toggleOverlays(); return; }
  if (e.key === 'f' || e.key === 'F') {
    const el = document.getElementById('projView');
    if      (el.requestFullscreen)       el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen)     el.msRequestFullscreen();
  }
});

window.addEventListener('resize', drawProjection);
document.addEventListener('fullscreenchange',       drawProjection);
document.addEventListener('webkitfullscreenchange', drawProjection);

// ── INIT ─────────────────────────────────────────────────────────
rebuildChips();

video.addEventListener('playing', function(){
  resizeCanvases();
  centerGrid();
  loop();
});
new ResizeObserver(function(){
  resizeCanvases();
  centerGrid();
}).observe(video);
startCamera();

window.addEventListener('DOMContentLoaded', function() {
  // Load noise CSV + mockData, then switch to camera tab
  Promise.all([loadGridData(), loadMockData()]).then(function() {
    switchTab('camera');
  });
});
</script>
